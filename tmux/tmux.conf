# --- Sensible defaults ---

# Use Ctrl-a instead of Ctrl-b (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse (scroll, click panes, resize)
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Faster key response
set -sg escape-time 0

# Increase scrollback
set -g history-limit 50000

# --- Navigation ---

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Ctrl+arrow
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# New windows in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Status bar ---

set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left " #[bold]#S  "
set -g status-right " %H:%M "
set -g status-left-length 30
setw -g window-status-current-style "bg=#45475a,fg=#cdd6f4,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
set -g extended-keys on
set -g extended-keys-format csi-u
